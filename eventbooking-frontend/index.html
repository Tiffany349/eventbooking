<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>
                Event Booking
            </h1>

            <p>
                Inicia sesión para continuar
            </p>

            <input type="text"
                   id="loginUsername"
                   placeholder="Username">

            <input type="password"
                   id="loginPassword"
                   placeholder="Password">

            <button onclick="login()">
                Ingresar
            </button>

            <div id="message"
                 class="message">
            </div>

            <a href="register.html"
               class="link">

                ¿No tienes cuenta?
                Regístrate

            </a>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>
</html>
